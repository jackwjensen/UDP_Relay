name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build when run manually (e.g. 1.2.3)"
        required: true

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for NuGet Trusted Publishing

jobs:
  release:
    name: Build & publish release
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET 8 / 9 / 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Determine version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
            echo "TAG=v${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Publish self-contained binaries
        run: |
          # Console host for Windows and Linux
          for rid in win-x64 linux-x64; do
            dotnet publish UDP_Relay_Console/UDP_Relay_Console.csproj \
              -c Release -f net10.0 -r "$rid" --self-contained true \
              -p:PublishSingleFile=true -p:Version="$VERSION" \
              -o "publish/console-$rid"
          done
          # Windows Service (Windows only)
          dotnet publish UDP_Relay_Service/UDP_Relay_Service.csproj \
            -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:Version="$VERSION" \
            -o "publish/service-win-x64"

      - name: Package artifacts
        run: |
          mkdir -p assets
          7z a "assets/UDP_Relay_Console-$VERSION-win-x64.zip"   "./publish/console-win-x64/*"
          7z a "assets/UDP_Relay_Console-$VERSION-linux-x64.zip" "./publish/console-linux-x64/*"
          7z a "assets/UDP_Relay_Service-$VERSION-win-x64.zip"   "./publish/service-win-x64/*"

      - name: Pack NuGet package
        run: dotnet pack UDP_Relay_Core/UDP_Relay_Core.csproj -c Release -p:Version="$VERSION" -o nupkgs

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" assets/*.zip --clobber
          else
            gh release create "$TAG" assets/*.zip --title "$TAG" --generate-notes
          fi

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived nuget.org
      # API key (no stored secret). Requires a Trusted Publishing policy on nuget.org
      # for this repo + workflow file (release.yml). 'user' is the nuget.org profile name.
      - name: NuGet login (trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: JackWJensen

      - name: Push NuGet package
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
