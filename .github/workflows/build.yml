name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET 8 / 9 / 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # Every project is SDK-style now (Core, Console, the two harnesses, the test
      # project and the .NET 10 Worker Service), so the whole solution builds with dotnet.
      - name: Build (entire solution)
        run: dotnet build UDP_Relay.sln -c Release

      - name: Test (net8.0 / net9.0 / net10.0)
        run: dotnet test UDP_Relay_Core.Tests/UDP_Relay_Core.Tests.csproj -c Release --no-build
