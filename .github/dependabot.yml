version: 2
updates:
  # NuGet package updates across all projects — bundled into a single grouped PR.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      nuget:
        patterns:
          - "*"

  # GitHub Actions used in the workflows — bundled into a single grouped PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
